<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brookstone School — Nav Bar</title>
<style>
  :root {
    --navy: #2b1a63;
    --navy-dark: #241353;
    --gold: #f0a828;
    --text-light: #e9e6f5;
    --text-muted: #b9b0dd;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f2f2f2;
  }

  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--navy);
    padding: 14px 40px;
    flex-wrap: wrap;
    gap: 20px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .crest {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid var(--text-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .crest svg {
    width: 28px;
    height: 28px;
    fill: var(--text-light);
  }

  .brand-text .name {
    color: #ffffff;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: 0.3px;
    line-height: 1.2;
  }

  .brand-text .tagline {
    color: var(--text-muted);
    font-size: 0.85rem;
    font-weight: 400;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 28px;
    list-style: none;
    margin: 0;
    padding: 0;
    flex-wrap: wrap;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--text-light);
    font-size: 0.95rem;
    font-weight: 500;
    padding: 6px 2px;
    position: relative;
    transition: color 0.2s ease;
  }

  .nav-links a:hover {
    color: var(--gold);
  }

  .nav-links a.active {
    color: var(--gold);
    font-weight: 700;
  }

  .nav-links a.active::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: -6px;
    height: 2px;
    background: var(--gold);
  }

  /* Mobile */
  .menu-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--text-light);
    font-size: 1.6rem;
    cursor: pointer;
  }

  @media (max-width: 800px) {
    .menu-toggle { display: block; }
    .nav-links {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
      padding-top: 10px;
    }
    .nav-links.open { display: flex; }
    .navbar { padding: 14px 20px; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="brand">
    <div class="crest">
      <svg viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5.25 3.4 9.7 8 11 4.6-1.3 8-5.75 8-11V5l-8-3zm0 2.2 6 2.25V11c0 4.2-2.6 7.9-6 8.9-3.4-1-6-4.7-6-8.9V6.45l6-2.25z"/></svg>
    </div>
    <div class="brand-text">
      <div class="name">BROOKSTONE SCHOOL</div>
      <div class="tagline">(Secondary)</div>
    </div>
  </div>

  <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Toggle navigation">☰</button>

  <ul class="nav-links">
    <li><a href="#" class="active">Home</a></li>
    <li><a href="#">About Us</a></li>
    <li><a href="#">Events</a></li>
    <li><a href="#">News</a></li>
    <li><a href="#">Admission</a></li>
    <li><a href="#">Contact Us</a></li>
    <li><a href="#">FAQ</a></li>
  </ul>
</nav>

</body>
</html>
